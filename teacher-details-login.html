<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Teacher Details</title>
</head>
<body>
    <div class="main_wrapper">
        <div class="login_wrapper">
            <div class="login-branding">
                <i class="fa-solid fa-chalkboard-user logo-icon"></i>
                <h2>Teacher Details</h2>
                <p>Please provide your professional details to complete your profile.</p>
            </div>
            <div class="form-container">
                <h1>Complete Your Profile</h1>
                <form action="">
                    <div class="input-group">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="teacher_id" placeholder="Enter your Teacher ID (e.g., TCH-042)">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-book"></i>
                        <input type="text" id="teacher_subjects" placeholder="Subjects Taught (e.g., Maths, Physics)">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-chalkboard"></i>
                        <input type="text" id="class_teacher" placeholder="Class Teacher of (e.g., 10th - B, or N/A)">
                    </div>
                    <button type="submit" id="teacher-details-submit" class="btn">Proceed to Dashboard</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
