<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - Admin Portal</title>
    <link rel="stylesheet" href="style3.css">
    <script src="script3.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar">
        <div class="nav-profile">
            <i class="fa-solid fa-user-shield"></i>
            <h3>E-Vidyalaya</h3>
        </div>
        <div class="user-details">
            <div class="user-info">
                <p id="user-name">Name: Admin User</p>
            </div>
            <div class="user-options">
                <i class="fa-solid fa-ellipsis-vertical options-icon"></i>
                <div class="options-menu hidden">
                    <a href="../profile.html">Profile</a>
                    <a href="../help-support.html">Help & Support</a>
                    <a href="../login-signup.html">Logout</a>
                </div>
            </div>
        </div>
        <ul class="nav-menu">
            <li><a href="admin.html"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a></li>
            <li><a href="manage-users.html"><i class="fa-solid fa-users-cog"></i><span>Manage Users</span></a></li>
            <li><a href="#"><i class="fa-solid fa-bullhorn"></i><span>Global Announcements</span></a></li>
            <li><a href="reports.html"><i class="fa-solid fa-chart-line"></i><span>System Reports</span></a></li>
            <li class="active"><a href="system-settings.html"><i class="fa-solid fa-cogs"></i><span>Settings</span></a></li>
        </ul>
        <div class="nav-logout">
            <a href="../login-signup.html"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
        </div>
    </nav>

    <div class="content-wrapper">
        <div id="top-bar">
            <button id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
            <h2 id="school-name">E-Vidyalaya Administration</h2>
            <div class="school-logo" style="background-image: url('../School Png PNG Transparent With Clear Background ID 137543 _ TopPNG.jpg'); background-size: cover; background-position: center;"></div>
        </div>

        <main id="main-content">
            <header class="main-header">
                <h1>System Settings</h1>
            </header>
            <hr>
            <section class="page-content">
                <form id="system-settings-form" style="max-width: 600px;">
                    <div class="form-group">
                        <label class="form-label">School Name</label>
                        <input type="text" value="E-Vidyalaya High School" class="form-input">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Current Academic Session</label>
                        <select class="form-select">
                            <option>2022-2023</option>
                            <option selected>2023-2024</option>
                            <option>2024-2025</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <div>
                            <h4>Maintenance Mode</h4>
                            <p class="setting-description">Prevent users from logging in during updates.</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" class="setting-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <button type="submit" id="save-settings-btn" class="btn btn-primary">Save Changes</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
