<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Student Details - Login</title>
</head>
<body>
<div class="main_wrapper">
    <div class="login_wrapper">
        <div class="login-branding">
            <i class="fa-solid fa-user-graduate logo-icon"></i>
            <h2>E-Vidyalaya</h2>
            <p>Step 2: Student Information</p>
        </div>
        <div class="form-container">
            <h1>Student Details</h1>
            <form action="">
                <div class="input-group">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" name="student_id" id="student_id" placeholder="Enter your Student ID">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-chalkboard-user"></i>
                    <input type="text" name="student_class" id="student_class" placeholder="Enter Class">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-hashtag"></i>
                    <input type="text" name="student_section" id="student_section" placeholder="Enter Section">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-list-ol"></i>
                    <input type="text" name="student_roll" id="student_roll" placeholder="Enter Roll No.">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-calendar-alt"></i>
                    <input type="text" name="session_year" id="session_year" placeholder="Enter Session Year (e.g., 2023-24)">
                </div>
                <button type="submit" class="btn" id="student-details-submit">Continue to Portal</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
