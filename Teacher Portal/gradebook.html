<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <script src="script2.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Gradebook - Teacher Portal</title>
</head>
<body>
    <nav id="navbar">
        <div class="nav-profile">
            <i class="fa-solid fa-chalkboard-user"></i>
            <h3>Teacher Portal</h3>
        </div>
        <div class="user-details">
            <div class="user-info-text">
                <p id="user-name">Name: </p>
                <p id="user-class-teacher">Class Teacher: </p>
                <p id="user-subjects">Subjects: </p>
                <p id="user-id">Teacher ID: </p>
            </div>
            <div class="user-options">
                <i class="fa-solid fa-circle-user options-icon"></i>
                <div class="options-menu hidden">
                    <a href="../profile.html">Profile</a>
                    <a href="../help-support.html">Help & Support</a>
                    <a href="../login-signup.html">Logout</a>
                </div>
            </div>
        </div>
        <ul class="nav-menu">
            <li><a href="teacher.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a></li>
            <li><a href="my-classes.html"><i class="fa-solid fa-users"></i><span>My Classes</span></a></li>
            <li><a href="attendance.html"><i class="fa-solid fa-user-check"></i><span>Attendance</span></a></li>
            <li class="active"><a href="gradebook.html"><i class="fa-solid fa-pen-to-square"></i><span>Gradebook</span></a></li>
            <li><a href="announcements.html"><i class="fa-solid fa-bullhorn"></i><span>Announcements</span></a></li>
            <li><a href="fees.html"><i class="fa-solid fa-money-bill"></i><span>Fees</span></a></li>
            <li><a href="chat.html"><i class="fa-solid fa-comment"></i><span>Chat</span></a></li>
        </ul>
        <div class="nav-logout">
            <a href="../login-signup.html"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
        </div>
    </nav>

    <div class="content-wrapper">
        <div id="top-bar">
            <button id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
            <div class="school-info">
                <h2 id="school-name">Your School Name</h2>
                <div class="school-logo"></div>
            </div>
        </div>

        <main id="main-content">
            <header class="main-header">
                <h1>Gradebook</h1>
            </header>

            <section class="page-content">
                <div class="gradebook-controls">
                    <div class="control-group">
                        <label for="class-select-grade">Class:</label>
                        <select id="class-select-grade">
                            <option>Class 10 - Section B</option>
                            <option>Class 10 - Section C</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="assignment-select">Assignment/Exam:</label>
                        <select id="assignment-select">
                            <option>Mathematics - Unit Test 1</option>
                            <option>Physics - Chapter 3 Problems</option>
                        </select>
                    </div>
                    <button class="btn-primary">Load Grade Sheet</button>
                </div>

                <table class="gradebook-table">
                    <thead>
                        <tr>
                            <th>Roll No.</th>
                            <th>Student Name</th>
                            <th>Marks Obtained (out of 100)</th>
                            <th>Comments</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Aarav Sharma</td>
                            <td><input type="number" class="marks-input" value="85"></td>
                            <td><input type="text" class="comments-input" placeholder="Optional comments..."></td>
                        </tr>
                        <!-- More students -->
                    </tbody>
                </table>
                <button class="btn-primary save-grades-btn">Save Grades</button>
            </section>
        </main>
    </div>
</body>
</html>
